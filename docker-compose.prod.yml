services:
  osiris:
    build: .
    image: osiris-dashboard
    container_name: osiris-dashboard
    # WEB_PORT is the LAN-facing host port. Verify it is free on the server
    # (ss -ltnp + docker ps) before deploying. Container listens on 4173.
    ports:
      - "${WEB_PORT:-8092}:4173"
    env_file:
      - .env
    environment:
      # Ensure the container binds all interfaces regardless of .env contents.
      HOST: 0.0.0.0
      PORT: 4173
      # Enable optional historical persistence, stored on the named volume below.
      # Comment this out (and the volume) to run stateless as before.
      OSIRIS_DB_PATH: /app/data/osiris.db
    volumes:
      - osiris-data:/app/data
    restart: unless-stopped

volumes:
  osiris-data: {}
